<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}
    </title>
    <link rel="stylesheet" href="/tufte.css" />
    <style>
      body {
        overflow-x: hidden;
      }
      {% if page.background_color %}
      body {
        background-color: {{ page.background_color }};
        color: {{ page.text_color | default: "#111111" }};
      }
      {% endif %}
      .back-home {
        position: absolute;
        top: 1rem;
        left: 1rem;
        {% if page.text_color %}
        color: {{ page.text_color }};
        {% else %}
        color: inherit;
        {% endif %}
        text-decoration: none;
        font-size: 1.5rem;
        z-index: 1000;
        line-height: 1;
      }
      h1 {
        margin-bottom: 3rem;
        text-align: center;
        width: 55%;
      }
      .separator {
        margin: 3rem 0 3rem 0;
        width: 55%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .separator img {
        width: 100%;
        height: auto;
        display: block;
        object-fit: contain;
      }
      .separator.stream-circle {
        width: 55%;
        max-width: 55%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 4.5rem 0;
        padding: 1.5rem 0;
        box-sizing: border-box;
      }
      .separator.stream-circle img {
        width: calc(100% / 3);
        max-width: calc(100% / 3);
        aspect-ratio: 1;
        border-radius: 50%;
        object-fit: cover;
        object-position: center;
        border: 2px solid white;
        box-sizing: border-box;
        display: block;
      }
      {% if page.generator == 'formulas' %}
      hr {
        display: none;
      }
      section .separator {
        width: 55% !important;
        max-width: 55% !important;
        box-sizing: border-box;
      }
      section .separator img {
        width: 84% !important;
        max-width: 84% !important;
        height: auto !important;
        display: block;
        margin-left: auto;
        margin-right: auto;
      }
      {% endif %}
      .compact-separator {
        margin: 5rem 0 0 0;
      }
      .compact-separator img {
        width: 40%;
      }
      @media (max-width: 760px) {
        h1 {
          width: 100%;
        }
        .separator {
          width: 100% !important;
          max-width: 100%;
          margin-left: 0;
          margin-right: 0;
          padding-left: 0;
          padding-right: 0;
          box-sizing: border-box;
        }
        .separator img {
          width: 100% !important;
          max-width: 100% !important;
        }
        .separator.stream-circle {
          width: 100% !important;
          max-width: 100%;
          justify-content: center;
          align-items: center;
        }
        .separator.stream-circle img {
          width: min(20rem, 86%) !important;
          max-width: min(20rem, 86%) !important;
          height: auto !important;
          margin-left: auto;
          margin-right: auto;
          flex-shrink: 0;
        }
        {% if page.generator == 'formulas' %}
        section .separator {
          width: 100% !important;
          max-width: 100% !important;
          margin-left: 0 !important;
          margin-right: 0 !important;
          justify-content: center;
          align-items: center;
        }
        section .separator img {
          width: 100% !important;
          max-width: 100% !important;
          margin-left: auto !important;
          margin-right: auto !important;
        }
        {% endif %}
      }
    </style>
  </head>
  <body>
    <a href="/" class="back-home">↖</a>
    <article>
      <section>
        <h1>{{ page.title }}</h1>
        {{ content }}
      </section>
    </article>
  </body>
</html>
